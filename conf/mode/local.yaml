# @package _global_
# Fast iteration on MPS
# Uses dev split for training (~10h, 2,416 samples, ~158MB, already cached)
# Note: 1_hours/9_hours splits are subsets of train and trigger full train download
data:
  train_split: "dev"
  val_split: "test"
training:
  epochs: 5
  early_stopping_patience: 2
  batch_size: 2
